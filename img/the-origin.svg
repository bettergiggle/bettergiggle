<svg viewBox="0 0 600 338" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="obg" cx="50%" cy="80%"><stop offset="0%" stop-color="#201000"/><stop offset="100%" stop-color="#06080f"/></radialGradient>
    <radialGradient id="olight" cx="50%" cy="100%"><stop offset="0%" stop-color="#ff6d00" stop-opacity="0.6"/><stop offset="40%" stop-color="#ffd166" stop-opacity="0.2"/><stop offset="100%" stop-color="#06080f" stop-opacity="0"/></radialGradient>
    <filter id="ofglow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="338" fill="url(#obg)"/>
  <!-- dramatic backlight from ground -->
  <ellipse cx="300" cy="338" rx="250" ry="100" fill="url(#olight)"/>
  <!-- atmospheric haze lines -->
  <path d="M100,280 Q200,270 300,275 Q400,280 500,270" fill="none" stroke="#ff6d00" stroke-width="30" opacity="0.04"/>
  <path d="M80,300 Q200,290 300,295 Q400,300 520,290" fill="none" stroke="#ffd166" stroke-width="15" opacity="0.05"/>
  <!-- distant skyline marks -->
  <rect x="80" y="240" width="8" height="60" fill="#0d0005" opacity="0.5"/>
  <rect x="110" y="228" width="6" height="72" fill="#0d0005" opacity="0.4"/>
  <rect x="470" y="235" width="8" height="65" fill="#0d0005" opacity="0.5"/>
  <rect x="500" y="244" width="6" height="56" fill="#0d0005" opacity="0.4"/>
  <!-- figure silhouette -->
  <g filter="url(#ofglow)">
    <!-- shadow on ground -->
    <ellipse cx="300" cy="298" rx="22" ry="5" fill="#ff6d00" opacity="0.3"/>
    <!-- head -->
    <ellipse cx="300" cy="190" rx="19" ry="19" fill="#06080f"/>
    <!-- neck/body -->
    <rect x="291" y="208" width="18" height="42" rx="4" fill="#06080f"/>
    <!-- arms hanging slightly out - iconic pose -->
    <path d="M291,218 Q270,225 255,220" fill="none" stroke="#06080f" stroke-width="9" stroke-linecap="round"/>
    <path d="M309,218 Q330,225 345,220" fill="none" stroke="#06080f" stroke-width="9" stroke-linecap="round"/>
    <!-- legs standing -->
    <path d="M294,250 Q288,272 282,292" fill="none" stroke="#06080f" stroke-width="9" stroke-linecap="round"/>
    <path d="M306,250 Q312,272 318,292" fill="none" stroke="#06080f" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- orange rim lighting on figure edges -->
  <ellipse cx="300" cy="220" rx="28" ry="55" fill="none" stroke="#ff6d00" stroke-width="3" opacity="0.35" filter="url(#ofglow)"/>
  <!-- particles floating up -->
  <circle cx="280" cy="260" r="2" fill="#ffd166" opacity="0.6"/>
  <circle cx="310" cy="245" r="1.5" fill="#ff9d00" opacity="0.5"/>
  <circle cx="295" cy="230" r="1" fill="#ffd166" opacity="0.4"/>
  <circle cx="320" cy="270" r="2.5" fill="#ff6d00" opacity="0.5"/>
  <circle cx="272" cy="280" r="1.5" fill="#ffd166" opacity="0.4"/>
  <!-- EP1 watermark style -->
  <text x="30" y="320" font-family="monospace" font-size="11" fill="#ff6d00" opacity="0.25" letter-spacing="3">EP.01</text>
</svg>
