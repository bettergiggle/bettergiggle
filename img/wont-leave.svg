<svg viewBox="0 0 600 338" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="fbg" cx="50%" cy="80%"><stop offset="0%" stop-color="#2a0800"/><stop offset="100%" stop-color="#06080f"/></radialGradient>
    <radialGradient id="fcore" cx="50%" cy="100%"><stop offset="0%" stop-color="#ff4400" stop-opacity="0.9"/><stop offset="30%" stop-color="#ff6d00" stop-opacity="0.6"/><stop offset="70%" stop-color="#ffd166" stop-opacity="0.15"/><stop offset="100%" stop-color="#06080f" stop-opacity="0"/></radialGradient>
    <filter id="ffglow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="338" fill="url(#fbg)"/>
  <!-- fire base -->
  <ellipse cx="300" cy="338" rx="280" ry="80" fill="url(#fcore)"/>
  <!-- smoke clouds -->
  <ellipse cx="200" cy="200" rx="60" ry="40" fill="#1a0800" opacity="0.5"/>
  <ellipse cx="400" cy="190" rx="55" ry="35" fill="#1a0800" opacity="0.5"/>
  <ellipse cx="300" cy="180" rx="70" ry="45" fill="#150600" opacity="0.4"/>
  <!-- fire tongues -->
  <path d="M220,338 Q210,290 240,260 Q225,230 250,210 Q230,180 260,160" fill="none" stroke="#ff4400" stroke-width="3" opacity="0.6" filter="url(#ffglow)"/>
  <path d="M380,338 Q390,290 360,260 Q375,230 350,210 Q370,180 340,160" fill="none" stroke="#ff4400" stroke-width="3" opacity="0.6" filter="url(#ffglow)"/>
