  <path d="M340,338 Q345,300 335,270" fill="none" stroke="#ff6d00" stroke-width="2" opacity="0.5"/>
  <!-- figure standing defiant in flames - arms raised -->
  <ellipse cx="300" cy="170" rx="20" ry="20" fill="#0d0010"/>
  <rect x="291" y="189" width="18" height="42" rx="4" fill="#0d0010"/>
