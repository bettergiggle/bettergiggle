  <path d="M291,200 Q265,185 245,170 Q230,158 225,145" fill="none" stroke="#0d0010" stroke-width="10" stroke-linecap="round"/>
  <path d="M309,200 Q335,185 355,170 Q370,158 375,145" fill="none" stroke="#0d0010" stroke-width="10" stroke-linecap="round"/>
  <!-- legs braced wide -->
  <path d="M294,230 Q280,256 268,278" fill="none" stroke="#0d0010" stroke-width="10" stroke-linecap="round"/>
  <path d="M306,230 Q320,256 332,278" fill="none" stroke="#0d0010" stroke-width="10" stroke-linecap="round"/>
  <!-- orange rim light on edges -->
  <ellipse cx="300" cy="205" rx="30" ry="55" fill="none" stroke="#ff6d00" stroke-width="3" opacity="0.4" filter="url(#ffglow)"/>
  <!-- sparks flying -->
  <circle cx="265" cy="200" r="2" fill="#ffd166" opacity="0.8"/>
  <circle cx="338" cy="195" r="3" fill="#ff9d00" opacity="0.7"/>
  <circle cx="250" cy="230" r="1.5" fill="#ffd166" opacity="0.6"/>
  <circle cx="355" cy="225" r="2" fill="#ff6d00" opacity="0.6"/>
  <circle cx="280" cy="250" r="2" fill="#ffd166" opacity="0.5"/>
  <circle cx="320" cy="245" r="1.5" fill="#ff9d00" opacity="0.5"/>
  <circle cx="240" cy="260" r="2.5" fill="#ff4400" opacity="0.5"/>
  <circle cx="360" cy="255" r="2" fill="#ff4400" opacity="0.5"/>
