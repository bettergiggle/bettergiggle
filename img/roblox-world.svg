<svg viewBox="0 0 600 338" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="rbg" cx="50%" cy="40%"><stop offset="0%" stop-color="#001825"/><stop offset="100%" stop-color="#06080f"/></radialGradient>
    <filter id="rfglow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="338" fill="url(#rbg)"/>
  <!-- grid floor -->
  <line x1="0" y1="270" x2="600" y2="270" stroke="#00b4d8" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="290" x2="600" y2="290" stroke="#00b4d8" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="310" x2="600" y2="310" stroke="#00b4d8" stroke-width="0.5" opacity="0.15"/>
  <!-- vertical grid lines -->
  <line x1="100" y1="270" x2="50" y2="338" stroke="#00b4d8" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="270" x2="160" y2="338" stroke="#00b4d8" stroke-width="0.5" opacity="0.2"/>
  <line x1="300" y1="270" x2="300" y2="338" stroke="#00b4d8" stroke-width="0.7" opacity="0.25"/>
  <line x1="400" y1="270" x2="440" y2="338" stroke="#00b4d8" stroke-width="0.5" opacity="0.2"/>
  <line x1="500" y1="270" x2="550" y2="338" stroke="#00b4d8" stroke-width="0.5" opacity="0.2"/>
  <!-- background blocky buildings -->
  <rect x="50" y="160" width="60" height="110" rx="3" fill="#001a2e" stroke="#003355" stroke-width="1" opacity="0.8"/>
  <rect x="130" y="190" width="45" height="80" rx="3" fill="#00111f" stroke="#002244" stroke-width="1" opacity="0.7"/>
  <rect x="470" y="155" width="65" height="115" rx="3" fill="#001a2e" stroke="#003355" stroke-width="1" opacity="0.8"/>
  <rect x="420" y="185" width="42" height="85" rx="3" fill="#00111f" stroke="#002244" stroke-width="1" opacity="0.7"/>
  <!-- building windows glow -->
  <rect x="62" y="175" width="12" height="10" rx="1" fill="#00b4d8" opacity="0.5"/>
  <rect x="82" y="175" width="12" height="10" rx="1" fill="#00b4d8" opacity="0.4"/>
  <rect x="62" y="200" width="12" height="10" rx="1" fill="#0077aa" opacity="0.5"/>
  <rect x="82" y="200" width="12" height="10" rx="1" fill="#00b4d8" opacity="0.4"/>
  <rect x="480" y="170" width="12" height="10" rx="1" fill="#00b4d8" opacity="0.5"/>
  <rect x="500" y="170" width="12" height="10" rx="1" fill="#9146ff" opacity="0.4"/>
  <rect x="480" y="195" width="12" height="10" rx="1" fill="#00b4d8" opacity="0.4"/>
  <!-- main Roblox blocky character -->
  <!-- head - square blocky -->
  <rect x="265" y="145" width="70" height="65" rx="6" fill="#1a0030" stroke="#00b4d8" stroke-width="2"/>
  <!-- face -->
  <rect x="278" y="162" width="16" height="14" rx="2" fill="#00b4d8" opacity="0.8"/><!-- eye L -->
  <rect x="306" y="162" width="16" height="14" rx="2" fill="#00b4d8" opacity="0.8"/><!-- eye R -->
  <!-- smiley mouth blocky style -->
  <rect x="283" y="185" width="34" height="7" rx="2" fill="#00b4d8" opacity="0.6"/>
  <!-- body block -->
  <rect x="262" y="215" width="76" height="55" rx="5" fill="#150025" stroke="#7b2fbe" stroke-width="1.5"/>
  <!-- teal chest logo -->
  <rect x="285" y="228" width="30" height="22" rx="3" fill="#00b4d8" opacity="0.4"/>
  <!-- left arm -->
  <rect x="228" y="218" width="32" height="46" rx="5" fill="#1a0030" stroke="#00b4d8" stroke-width="1.5"/>
  <!-- right arm -->
  <rect x="340" y="218" width="32" height="46" rx="5" fill="#1a0030" stroke="#7b2fbe" stroke-width="1.5"/>
  <!-- legs -->
  <rect x="264" y="272" width="32" height="40" rx="5" fill="#150025" stroke="#00b4d8" stroke-width="1.5"/>
  <rect x="304" y="272" width="32" height="40" rx="5" fill="#150025" stroke="#7b2fbe" stroke-width="1.5"/>
  <!-- glow around character -->
  <rect x="255" y="138" rx="10" width="90" height="185" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.3" filter="url(#rfglow)"/>
  <!-- floating particles -->
  <rect x="190" y="200" width="8" height="8" rx="2" fill="#00b4d8" opacity="0.4" filter="url(#rfglow)"/>
  <rect x="400" y="195" width="6" height="6" rx="1" fill="#9146ff" opacity="0.4" filter="url(#rfglow)"/>
  <rect x="165" y="235" width="5" height="5" rx="1" fill="#00b4d8" opacity="0.3"/>
  <rect x="430" y="230" width="7" height="7" rx="2" fill="#7b2fbe" opacity="0.35"/>
</svg>
