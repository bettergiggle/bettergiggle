<svg viewBox="0 0 600 338" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sbg" cx="50%" cy="50%"><stop offset="0%" stop-color="#150800"/><stop offset="100%" stop-color="#06080f"/></radialGradient>
    <radialGradient id="clash" cx="50%" cy="50%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="20%" stop-color="#ffd166" stop-opacity="0.8"/><stop offset="50%" stop-color="#ff6d00" stop-opacity="0.5"/><stop offset="100%" stop-color="#06080f" stop-opacity="0"/></radialGradient>
    <filter id="sfglow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="338" fill="url(#sbg)"/>
  <!-- background streaks -->
  <path d="M0,169 Q150,160 300,169 Q450,178 600,169" fill="none" stroke="#ff6d00" stroke-width="60" opacity="0.06"/>
  <path d="M0,169 Q300,155 600,169" fill="none" stroke="#c77dff" stroke-width="20" opacity="0.06"/>
  <!-- clash explosion centre -->
  <circle cx="300" cy="180" r="55" fill="url(#clash)" filter="url(#sfglow)"/>
  <!-- impact spikes -->
  <path d="M300,180 L260,140 M300,180 L245,165 M300,180 L250,190 M300,180 L265,215" stroke="#ffd166" stroke-width="2" opacity="0.7"/>
  <path d="M300,180 L340,140 M300,180 L355,165 M300,180 L350,190 M300,180 L335,215" stroke="#ff6d00" stroke-width="2" opacity="0.7"/>
  <!-- LEFT figure - orange energy -->
  <ellipse cx="165" cy="155" rx="18" ry="18" fill="#0d0010"/><!-- head -->
  <rect x="156" y="172" width="18" height="38" rx="4" fill="#0d0010"/><!-- body -->
  <!-- right arm punching forward -->
  <path d="M174,182 Q210,175 255,178" fill="none" stroke="#0d0010" stroke-width="9" stroke-linecap="round"/>
  <!-- left arm back -->
  <path d="M156,182 Q130,172 115,168" fill="none" stroke="#0d0010" stroke-width="9" stroke-linecap="round"/>
  <path d="M159,210 Q145,235 135,255" fill="none" stroke="#0d0010" stroke-width="9" stroke-linecap="round"/>
  <path d="M174,210 Q180,235 185,255" fill="none" stroke="#0d0010" stroke-width="9" stroke-linecap="round"/>
  <!-- orange aura left figure -->
  <ellipse cx="165" cy="190" rx="50" ry="65" fill="none" stroke="#ff6d00" stroke-width="2" opacity="0.5" filter="url(#sfglow)"/>
  <ellipse cx="165" cy="155" rx="20" ry="20" fill="none" stroke="#ffd166" stroke-width="1.5" opacity="0.4"/>
  <!-- RIGHT figure - purple energy -->
  <ellipse cx="435" cy="155" rx="18" ry="18" fill="#0d0010"/>
  <rect x="426" y="172" width="18" height="38" rx="4" fill="#0d0010"/>
  <!-- left arm punching -->
  <path d="M426,182 Q390,175 345,178" fill="none" stroke="#0d0010" stroke-width="9" stroke-linecap="round"/>
  <!-- right arm back -->
  <path d="M444,182 Q470,172 485,168" fill="none" stroke="#0d0010" stroke-width="9" stroke-linecap="round"/>
  <path d="M429,210 Q415,235 405,255" fill="none" stroke="#0d0010" stroke-width="9" stroke-linecap="round"/>
  <path d="M444,210 Q455,235 465,255" fill="none" stroke="#0d0010" stroke-width="9" stroke-linecap="round"/>
  <!-- purple aura right figure -->
  <ellipse cx="435" cy="190" rx="50" ry="65" fill="none" stroke="#c77dff" stroke-width="2" opacity="0.5" filter="url(#sfglow)"/>
  <ellipse cx="435" cy="155" rx="20" ry="20" fill="none" stroke="#c77dff" stroke-width="1.5" opacity="0.4"/>
  <!-- speed lines -->
  <path d="M50,169 L130,165" stroke="#ff6d00" stroke-width="1.5" opacity="0.4"/>
  <path d="M40,180 L120,178" stroke="#ff9d00" stroke-width="1" opacity="0.3"/>
  <path d="M550,169 L470,165" stroke="#c77dff" stroke-width="1.5" opacity="0.4"/>
  <path d="M560,180 L480,178" stroke="#9d4edd" stroke-width="1" opacity="0.3"/>
  <!-- ground -->
  <ellipse cx="300" cy="318" rx="220" ry="16" fill="#1a0500" opacity="0.7"/>
</svg>
