<svg viewBox="0 0 600 338" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="70%"><stop offset="0%" stop-color="#200010"/><stop offset="50%" stop-color="#100008"/><stop offset="100%" stop-color="#06080f"/></radialGradient>
    <radialGradient id="eyes" cx="50%" cy="50%"><stop offset="0%" stop-color="#ff66aa"/><stop offset="40%" stop-color="#cc0066"/><stop offset="100%" stop-color="#660033" stop-opacity="0"/></radialGradient>
    <radialGradient id="bodyglow" cx="50%" cy="50%"><stop offset="0%" stop-color="#9d4edd" stop-opacity="0.6"/><stop offset="100%" stop-color="#06080f" stop-opacity="0"/></radialGradient>
    <filter id="eglow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="rglow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="338" fill="url(#bg2)"/>
  <!-- red tendrils/vines background -->
  <path d="M0,50 Q80,80 100,150 Q120,200 80,250 Q50,290 100,338" fill="none" stroke="#cc0022" stroke-width="3" opacity="0.7"/>
  <path d="M20,0 Q60,60 40,130 Q20,180 60,220 Q90,260 70,310" fill="none" stroke="#aa0033" stroke-width="2" opacity="0.5"/>
  <path d="M600,30 Q520,90 510,170 Q500,230 540,280" fill="none" stroke="#cc0022" stroke-width="3" opacity="0.7"/>
  <path d="M580,0 Q530,70 550,140 Q565,200 520,260 Q490,300 520,338" fill="none" stroke="#880022" stroke-width="2" opacity="0.5"/>
  <path d="M150,0 Q180,50 160,110 Q140,160 170,200 Q200,240 180,290" fill="none" stroke="#990011" stroke-width="1.5" opacity="0.4"/>
  <path d="M400,0 Q440,60 420,120 Q400,180 450,230 Q480,260 460,320" fill="none" stroke="#990011" stroke-width="1.5" opacity="0.4"/>
  <!-- more tendrils from sides -->
  <path d="M0,200 Q60,190 120,210 Q180,230 200,260" fill="none" stroke="#cc1133" stroke-width="2.5" opacity="0.6"/>
  <path d="M600,160 Q540,170 480,190 Q420,210 390,240" fill="none" stroke="#cc1133" stroke-width="2.5" opacity="0.6"/>
  <path d="M0,280 Q100,270 160,290 Q210,305 230,338" fill="none" stroke="#aa0022" stroke-width="2" opacity="0.5"/>
  <!-- creature body glow -->
  <ellipse cx="300" cy="230" rx="60" ry="80" fill="url(#bodyglow)"/>
  <!-- creature body silhouette -->
  <ellipse cx="300" cy="195" rx="38" ry="42" fill="#0d0018"/><!-- head -->
  <rect x="278" y="232" width="44" height="50" rx="6" fill="#0d0018"/><!-- torso -->
  <!-- spiky head -->
  <path d="M270,180 L260,155 L278,172 L272,148 L286,168 L285,142 L296,166 L298,138 L304,165 L310,140 L314,166 L324,145 L320,170 L334,155 L325,178" fill="#0d0018" stroke="#1a0030" stroke-width="0.5"/>
  <!-- arms spread wide -->
  <path d="M278,242 Q240,235 210,250 Q190,258 175,245" fill="none" stroke="#0d0018" stroke-width="14" stroke-linecap="round"/>
  <path d="M322,242 Q360,235 390,250 Q410,258 425,245" fill="none" stroke="#0d0018" stroke-width="14" stroke-linecap="round"/>
  <!-- legs -->
  <path d="M285,282 Q275,310 265,330" fill="none" stroke="#0d0018" stroke-width="14" stroke-linecap="round"/>
  <path d="M315,282 Q325,310 335,330" fill="none" stroke="#0d0018" stroke-width="14" stroke-linecap="round"/>
  <!-- glowing eyes -->
  <ellipse cx="287" cy="192" rx="9" ry="10" fill="url(#eyes)" filter="url(#eglow)"/>
  <ellipse cx="313" cy="192" rx="9" ry="10" fill="url(#eyes)" filter="url(#eglow)"/>
  <!-- eye whites/pupils -->
  <ellipse cx="287" cy="192" rx="5" ry="6" fill="#ff88cc" opacity="0.9"/>
  <ellipse cx="313" cy="192" rx="5" ry="6" fill="#ff88cc" opacity="0.9"/>
  <ellipse cx="287" cy="193" rx="2.5" ry="3" fill="#ffffff"/>
  <ellipse cx="313" cy="193" rx="2.5" ry="3" fill="#ffffff"/>
  <!-- purple aura around body -->
  <ellipse cx="300" cy="230" rx="55" ry="65" fill="none" stroke="#9d4edd" stroke-width="2" opacity="0.4"/>
  <ellipse cx="300" cy="230" rx="70" ry="80" fill="none" stroke="#7b2fbe" stroke-width="1" opacity="0.2"/>
  <!-- ground dark pool -->
  <ellipse cx="300" cy="330" rx="100" ry="18" fill="#1a0030" opacity="0.7"/>
</svg>
