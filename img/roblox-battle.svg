<svg viewBox="0 0 600 338" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="rbbg" cx="50%" cy="50%"><stop offset="0%" stop-color="#100020"/><stop offset="100%" stop-color="#06080f"/></radialGradient>
    <radialGradient id="rbclash" cx="50%" cy="50%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/><stop offset="30%" stop-color="#9146ff" stop-opacity="0.6"/><stop offset="70%" stop-color="#00b4d8" stop-opacity="0.3"/><stop offset="100%" stop-color="#06080f" stop-opacity="0"/></radialGradient>
    <filter id="rbglow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="338" fill="url(#rbbg)"/>
  <!-- clash in centre -->
  <circle cx="300" cy="185" r="50" fill="url(#rbclash)" filter="url(#rbglow)"/>
  <!-- impact lines -->
  <path d="M300,185 L255,150 M300,185 L245,175 M300,185 L255,215" stroke="#9146ff" stroke-width="2" opacity="0.6"/>
  <path d="M300,185 L345,150 M300,185 L355,175 M300,185 L345,215" stroke="#00b4d8" stroke-width="2" opacity="0.6"/>
  <!-- LEFT blocky character - purple side -->
  <rect x="100" y="155" width="58" height="52" rx="5" fill="#1a0035" stroke="#9146ff" stroke-width="2"/>
  <rect x="112" y="168" width="13" height="12" rx="2" fill="#9146ff" opacity="0.9"/>
  <rect x="133" y="168" width="13" height="12" rx="2" fill="#9146ff" opacity="0.9"/>
  <rect x="100" y="210" width="58" height="44" rx="4" fill="#130028" stroke="#7b2fbe" stroke-width="1.5"/>
  <!-- left arm punching right -->
  <rect x="160" y="214" width="80" height="34" rx="5" fill="#1a0035" stroke="#9146ff" stroke-width="2"/>
  <!-- left back arm -->
  <rect x="62" y="214" width="36" height="34" rx="5" fill="#1a0035" stroke="#7b2fbe" stroke-width="1.5"/>
  <rect x="102" y="256" width="26" height="38" rx="4" fill="#130028" stroke="#9146ff" stroke-width="1.5"/>
  <rect x="132" y="256" width="26" height="38" rx="4" fill="#130028" stroke="#7b2fbe" stroke-width="1.5"/>
  <!-- RIGHT blocky character - teal side -->
  <rect x="442" y="155" width="58" height="52" rx="5" fill="#001825" stroke="#00b4d8" stroke-width="2"/>
  <rect x="454" y="168" width="13" height="12" rx="2" fill="#00b4d8" opacity="0.9"/>
  <rect x="475" y="168" width="13" height="12" rx="2" fill="#00b4d8" opacity="0.9"/>
  <rect x="442" y="210" width="58" height="44" rx="4" fill="#001220" stroke="#0077aa" stroke-width="1.5"/>
  <!-- right arm punching left -->
  <rect x="360" y="214" width="80" height="34" rx="5" fill="#001825" stroke="#00b4d8" stroke-width="2"/>
  <!-- right back arm -->
  <rect x="502" y="214" width="36" height="34" rx="5" fill="#001825" stroke="#0077aa" stroke-width="1.5"/>
  <rect x="444" y="256" width="26" height="38" rx="4" fill="#001220" stroke="#00b4d8" stroke-width="1.5"/>
  <rect x="474" y="256" width="26" height="38" rx="4" fill="#001220" stroke="#0077aa" stroke-width="1.5"/>
  <!-- energy particles -->
  <rect x="220" y="165" width="6" height="6" rx="1" fill="#9146ff" opacity="0.7" filter="url(#rbglow)"/>
  <rect x="375" y="162" width="7" height="7" rx="1" fill="#00b4d8" opacity="0.7" filter="url(#rbglow)"/>
  <rect x="200" y="200" width="5" height="5" rx="1" fill="#c77dff" opacity="0.6"/>
  <rect x="395" y="198" width="5" height="5" rx="1" fill="#00d4ff" opacity="0.6"/>
  <!-- ground -->
  <ellipse cx="300" cy="310" rx="250" ry="18" fill="#0d0020" opacity="0.8"/>
</svg>
